<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <radialGradient id="h_bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d2137"/><stop offset="100%" stop-color="#030912"/>
    </radialGradient>
    <linearGradient id="h_bar_dn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity=".7"/><stop offset="100%" stop-color="#e74c3c" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="h_bar_up" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity=".78"/><stop offset="100%" stop-color="#2ecc71" stop-opacity=".12"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#h_bg)"/>
  <circle cx="400" cy="220" r="178" fill="rgba(0,168,232,.04)"/>
  <!-- House group -->
  <g transform="translate(400,228)">
    <!-- Ground shadow -->
    <ellipse cx="0" cy="114" rx="110" ry="12" fill="rgba(0,0,0,.3)"/>
    <!-- Roof -->
    <path d="M0,-142 L-114,-34 L114,-34 Z"
          fill="rgba(0,100,160,.18)" stroke="rgba(0,168,232,.42)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Roof inner (subtle) -->
    <path d="M0,-124 L-98,-34 L98,-34 Z"
          fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <!-- Chimney -->
    <rect x="48" y="-120" width="22" height="50" rx="3" fill="rgba(0,80,140,.6)" stroke="rgba(0,168,232,.25)" stroke-width="1"/>
    <!-- Walls -->
    <rect x="-90" y="-34" width="180" height="148" rx="4"
          fill="rgba(10,22,42,.92)" stroke="rgba(0,168,232,.3)" stroke-width="2"/>
    <!-- Door -->
    <rect x="-22" y="56" width="44" height="58" rx="5"
          fill="rgba(0,120,180,.2)" stroke="rgba(0,168,232,.38)" stroke-width="1.5"/>
    <circle cx="16" cy="86" r="4" fill="rgba(201,162,39,.65)"/>
    <!-- Door arch -->
    <path d="M-22,56 Q-22,44 0,44 Q22,44 22,56"
          fill="rgba(0,168,232,.1)" stroke="rgba(0,168,232,.28)" stroke-width="1"/>
    <!-- Window left -->
    <rect x="-76" y="-2" width="42" height="38" rx="5"
          fill="rgba(201,162,39,.1)" stroke="rgba(201,162,39,.32)" stroke-width="1.5"/>
    <line x1="-55" y1="-2"  x2="-55" y2="36" stroke="rgba(201,162,39,.28)" stroke-width="1"/>
    <line x1="-76" y1="17"  x2="-34" y2="17" stroke="rgba(201,162,39,.28)" stroke-width="1"/>
    <!-- Window right -->
    <rect x="34"  y="-2" width="42" height="38" rx="5"
          fill="rgba(201,162,39,.1)" stroke="rgba(201,162,39,.32)" stroke-width="1.5"/>
    <line x1="55"  y1="-2"  x2="55"  y2="36" stroke="rgba(201,162,39,.28)" stroke-width="1"/>
    <line x1="34"  y1="17"  x2="76"  y2="17" stroke="rgba(201,162,39,.28)" stroke-width="1"/>
    <!-- Ground line -->
    <line x1="-130" y1="114" x2="130" y2="114" stroke="rgba(0,168,232,.2)" stroke-width="1.5"/>
  </g>
  <!-- Tree left -->
  <g transform="translate(248,338)">
    <ellipse cx="0" cy="-24" rx="19" ry="24" fill="rgba(46,204,113,.14)" stroke="rgba(46,204,113,.26)" stroke-width="1"/>
    <rect x="-4" y="0" width="8" height="22" rx="2" fill="rgba(201,162,39,.2)" stroke="rgba(201,162,39,.26)" stroke-width="1"/>
  </g>
  <!-- Tree right -->
  <g transform="translate(552,338)">
    <ellipse cx="0" cy="-24" rx="19" ry="24" fill="rgba(46,204,113,.14)" stroke="rgba(46,204,113,.26)" stroke-width="1"/>
    <rect x="-4" y="0" width="8" height="22" rx="2" fill="rgba(201,162,39,.2)" stroke="rgba(201,162,39,.26)" stroke-width="1"/>
  </g>
  <!-- Rate badge (left) -->
  <g transform="translate(185,202)">
    <circle cx="0" cy="0" r="58" fill="rgba(46,204,113,.1)"  stroke="rgba(46,204,113,.36)" stroke-width="2"/>
    <circle cx="0" cy="0" r="46" fill="rgba(46,204,113,.06)" stroke="rgba(46,204,113,.18)" stroke-width="1" stroke-dasharray="5 8"/>
    <rect x="-26" y="-20" width="52" height="18" rx="9" fill="rgba(46,204,113,.65)"/>
    <rect x="-20" y="4"  width="40" height="10" rx="5" fill="rgba(255,255,255,.15)"/>
    <!-- Down arrow -->
    <path d="M0 20 L-11 35 L11 35 Z" fill="rgba(46,204,113,.72)"/>
    <!-- Small % -->
    <rect x="-12" y="-16" width="8" height="10" rx="4" fill="rgba(0,0,0,.3)"/>
    <rect x="4"   y="-16" width="8" height="10" rx="4" fill="rgba(0,0,0,.3)"/>
    <line x1="-10" y1="-6" x2="10" y2="-16" stroke="rgba(0,0,0,.3)" stroke-width="2"/>
  </g>
  <!-- Mini bar chart (right panel) -->
  <g transform="translate(622,228)">
    <rect x="-72" y="-84" width="144" height="128" rx="14"
          fill="rgba(10,22,42,.88)" stroke="rgba(201,162,39,.26)" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="-58" y="-72" width="84" height="9" rx="4.5" fill="rgba(201,162,39,.35)"/>
    <!-- Down-trend bars -->
    <rect x="-52" y="-54" width="18" height="56" rx="4 4 0 0" fill="url(#h_bar_dn)"/>
    <rect x="-28" y="-44" width="18" height="46" rx="4 4 0 0" fill="url(#h_bar_dn)"/>
    <rect x="-4"  y="-32" width="18" height="34" rx="4 4 0 0" fill="url(#h_bar_up)"/>
    <rect x="20"  y="-22" width="18" height="24" rx="4 4 0 0" fill="url(#h_bar_up)"/>
    <rect x="44"  y="-12" width="18" height="14" rx="4 4 0 0" fill="url(#h_bar_up)"/>
    <!-- Trend line -->
    <polyline points="-43,-50 -19,-40 5,-28 29,-18 53,-8"
              stroke="rgba(46,204,113,.78)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Base -->
    <line x1="-58" y1="2" x2="72" y2="2" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <!-- Down-arrow indicator -->
    <path d="M48 10 L56 10 L56 22" stroke="rgba(46,204,113,.7)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="56" cy="25" r="4" fill="rgba(46,204,113,.7)"/>
  </g>
  <!-- Key icon -->
  <g transform="translate(576,342)">
    <circle cx="0" cy="0" r="15" fill="rgba(201,162,39,.12)" stroke="rgba(201,162,39,.38)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="rgba(201,162,39,.55)" stroke-width="2.5"/>
    <rect x="12" y="-3.5" width="28" height="7" rx="3.5" fill="rgba(201,162,39,.62)"/>
    <rect x="30" y="3.5"  width="9"  height="5" rx="2.5" fill="rgba(201,162,39,.5)"/>
  </g>
  <!-- Floating particles -->
  <circle cx="148" cy="128" r="5"  fill="rgba(0,168,232,.28)"/>
  <circle cx="148" cy="128" r="12" fill="none" stroke="rgba(0,168,232,.13)" stroke-width="1"/>
  <circle cx="692" cy="118" r="4"  fill="rgba(201,162,39,.22)"/>
  <circle cx="692" cy="118" r="10" fill="none" stroke="rgba(201,162,39,.1)"  stroke-width="1"/>
  <circle cx="130" cy="342" r="3"  fill="rgba(201,162,39,.2)"/>
  <circle cx="706" cy="354" r="2.5" fill="rgba(0,168,232,.16)"/>
  <circle cx="82"  cy="240" r="2"  fill="rgba(255,255,255,.14)"/>
</svg>
