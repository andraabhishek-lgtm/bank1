  <circle cx="166" cy="190" r="5" fill="rgba(46,204,113,.9)" stroke="rgba(46,204,113,.3)" stroke-width="3"/>
  <circle cx="312" cy="138" r="5" fill="rgba(46,204,113,.9)" stroke="rgba(46,204,113,.3)" stroke-width="3"/>
  <circle cx="531" cy="108" r="5" fill="rgba(46,204,113,.9)" stroke="rgba(46,204,113,.3)" stroke-width="3"/>
  <circle cx="604" cy="97"  r="7" fill="rgba(201,162,39,.95)" stroke="rgba(201,162,39,.3)" stroke-width="4"/>
  <!-- Rate badge top right -->
  <rect x="588" y="55" width="98" height="34" rx="17" fill="rgba(201,162,39,.14)" stroke="rgba(201,162,39,.42)" stroke-width="1.5"/>
  <rect x="602" y="66" width="52" height="12" rx="6" fill="rgba(201,162,39,.62)"/>
  <rect x="660" y="68" width="18" height="8"  rx="4" fill="rgba(46,204,113,.5)"/>
  <!-- ₹ symbol (circle) -->
  <circle cx="680" cy="110" r="24" fill="rgba(201,162,39,.1)" stroke="rgba(201,162,39,.3)" stroke-width="1.5"/>
  <rect x="671" y="101" width="18" height="4" rx="2" fill="rgba(201,162,39,.7)"/>
  <rect x="671" y="109" width="16" height="4" rx="2" fill="rgba(201,162,39,.5)"/>
  <rect x="674" y="105" width="4" height="18" rx="2" fill="rgba(201,162,39,.7)"/>
  <!-- Legend row -->
  <rect x="148" y="374" width="16" height="16" rx="4" fill="rgba(201,162,39,.82)"/>
  <rect x="170" y="379" width="62" height="6" rx="3" fill="rgba(255,255,255,.2)"/>
  <rect x="262" y="374" width="16" height="16" rx="4" fill="rgba(0,168,232,.72)"/>
  <rect x="284" y="379" width="52" height="6" rx="3" fill="rgba(255,255,255,.2)"/>
  <rect x="368" y="374" width="16" height="16" rx="4" fill="rgba(46,204,113,.82)"/>
  <rect x="390" y="379" width="56" height="6" rx="3" fill="rgba(255,255,255,.2)"/>
  <!-- Floating particles -->
  <circle cx="92"  cy="170" r="4" fill="rgba(0,168,232,.28)"/>
  <circle cx="92"  cy="170" r="10" fill="none" stroke="rgba(0,168,232,.13)" stroke-width="1"/>
  <circle cx="720" cy="240" r="3.5" fill="rgba(201,162,39,.22)"/>
  <circle cx="55"  cy="300" r="2.5" fill="rgba(201,162,39,.18)"/>
  <circle cx="745" cy="360" r="2"   fill="rgba(255,255,255,.14)"/>
