<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <radialGradient id="a_bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d2137"/><stop offset="100%" stop-color="#030912"/>
    </radialGradient>
    <linearGradient id="a_bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a227" stop-opacity=".92"/><stop offset="100%" stop-color="#c9a227" stop-opacity=".18"/>
    </linearGradient>
    <linearGradient id="a_bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00a8e8" stop-opacity=".72"/><stop offset="100%" stop-color="#00a8e8" stop-opacity=".12"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#a_bg)"/>
  <!-- Subtle grid -->
  <line x1="118" y1="330" x2="690" y2="330" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="118" y1="272" x2="690" y2="272" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="118" y1="214" x2="690" y2="214" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="118" y1="156" x2="690" y2="156" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  <line x1="118" y1="98"  x2="690" y2="98"  stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <!-- Axes -->
  <line x1="118" y1="330" x2="118" y2="72" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
  <line x1="118" y1="330" x2="710" y2="330" stroke="rgba(255,255,255,.12)" stroke-width="1.5"/>
  <!-- Y-axis tick labels (blocks) -->
  <rect x="66" y="265" width="40" height="12" rx="6" fill="rgba(201,162,39,.28)"/>
  <rect x="66" y="207" width="40" height="12" rx="6" fill="rgba(201,162,39,.28)"/>
  <rect x="66" y="149" width="40" height="12" rx="6" fill="rgba(201,162,39,.28)"/>
  <rect x="66" y="91"  width="40" height="12" rx="6" fill="rgba(201,162,39,.28)"/>
  <!-- Gold bars -->
  <rect x="145" y="196" width="42" height="134" rx="5 5 0 0" fill="url(#a_bar)"/>
  <rect x="218" y="168" width="42" height="162" rx="5 5 0 0" fill="url(#a_bar)"/>
  <rect x="291" y="148" width="42" height="182" rx="5 5 0 0" fill="url(#a_bar)"/>
  <rect x="364" y="134" width="42" height="196" rx="5 5 0 0" fill="url(#a_bar)"/>
  <rect x="437" y="152" width="42" height="178" rx="5 5 0 0" fill="url(#a_bar)"/>
  <rect x="510" y="118" width="42" height="212" rx="5 5 0 0" fill="url(#a_bar)"/>
  <rect x="583" y="106" width="42" height="224" rx="5 5 0 0" fill="url(#a_bar)"/>
  <!-- Blue bars (overlaid smaller) -->
  <rect x="191" y="248" width="24" height="82" rx="4 4 0 0" fill="url(#a_bar2)"/>
  <rect x="264" y="234" width="24" height="96" rx="4 4 0 0" fill="url(#a_bar2)"/>
  <rect x="337" y="218" width="24" height="112" rx="4 4 0 0" fill="url(#a_bar2)"/>
  <rect x="410" y="238" width="24" height="92"  rx="4 4 0 0" fill="url(#a_bar2)"/>
  <rect x="483" y="208" width="24" height="122" rx="4 4 0 0" fill="url(#a_bar2)"/>
  <rect x="556" y="194" width="24" height="136" rx="4 4 0 0" fill="url(#a_bar2)"/>
  <rect x="629" y="174" width="24" height="156" rx="4 4 0 0" fill="url(#a_bar2)"/>
  <!-- Trend line (green) -->
  <polyline points="166,190 239,162 312,138 385,126 458,144 531,108 604,97"
