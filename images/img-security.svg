<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" fill="none">
  <defs>
    <radialGradient id="sv_bg" cx="50%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#0d2137"/><stop offset="100%" stop-color="#030912"/>
    </radialGradient>
    <radialGradient id="sv_blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,168,232,.22)"/><stop offset="100%" stop-color="rgba(0,168,232,0)"/>
    </radialGradient>
    <radialGradient id="sv_gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(201,162,39,.2)"/><stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="sv_rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(201,162,39,.65)"/><stop offset="50%" stop-color="rgba(232,185,35,.85)"/><stop offset="100%" stop-color="rgba(160,120,20,.55)"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#sv_bg)" rx="20"/>
  <!-- Glow orbs -->
  <circle cx="350" cy="200" r="170" fill="url(#sv_blue)"/>
  <circle cx="350" cy="200" r="130" fill="url(#sv_gold)"/>
  <!-- Outer concentric rings -->
  <circle cx="350" cy="200" r="195" stroke="rgba(201,162,39,.06)" stroke-width="1.5"/>
  <circle cx="350" cy="200" r="170" stroke="rgba(0,168,232,.09)"  stroke-width="1" stroke-dasharray="8 14"/>
  <circle cx="350" cy="200" r="148" stroke="rgba(201,162,39,.08)" stroke-width="1"/>
  <!-- Vault door outer ring -->
  <circle cx="350" cy="200" r="115"
          fill="rgba(7,16,32,.88)" stroke="url(#sv_rim)" stroke-width="3.5"/>
  <!-- Vault inner ring -->
  <circle cx="350" cy="200" r="100"
          fill="none" stroke="rgba(255,255,255,.05)" stroke-width="2"/>
  <!-- 12 bolts around vault -->
  <g fill="rgba(201,162,39,.58)" stroke="rgba(201,162,39,.32)" stroke-width="1">
    <circle cx="350" cy="87"  r="8.5"/>
    <circle cx="406" cy="101" r="8.5"/>
    <circle cx="449" cy="141" r="8.5"/>
    <circle cx="463" cy="200" r="8.5"/>
    <circle cx="449" cy="259" r="8.5"/>
    <circle cx="406" cy="299" r="8.5"/>
    <circle cx="350" cy="313" r="8.5"/>
    <circle cx="294" cy="299" r="8.5"/>
    <circle cx="251" cy="259" r="8.5"/>
    <circle cx="237" cy="200" r="8.5"/>
    <circle cx="251" cy="141" r="8.5"/>
    <circle cx="294" cy="101" r="8.5"/>
  </g>
  <!-- Inner vault face -->
  <circle cx="350" cy="200" r="76"
          fill="rgba(12,24,44,.94)" stroke="rgba(0,168,232,.32)" stroke-width="2"/>
  <!-- Dial ring -->
  <circle cx="350" cy="200" r="42"
          fill="rgba(201,162,39,.14)" stroke="rgba(201,162,39,.52)" stroke-width="2"/>
  <!-- Dial spokes (8) -->
  <g stroke="rgba(201,162,39,.44)" stroke-width="2.5" stroke-linecap="round">
    <line x1="350" y1="160" x2="350" y2="240"/>
    <line x1="311" y1="200" x2="389" y2="200"/>
    <line x1="322" y1="172" x2="378" y2="228"/>
    <line x1="378" y1="172" x2="322" y2="228"/>
  </g>
  <!-- Center knob -->
  <circle cx="350" cy="200" r="14" fill="rgba(201,162,39,.82)" stroke="rgba(255,200,50,.3)" stroke-width="2"/>
  <circle cx="350" cy="200" r="7"  fill="rgba(7,16,32,.9)"/>
  <!-- Handle bar -->
  <rect x="392" y="193" width="38" height="14" rx="7" fill="rgba(201,162,39,.68)" stroke="rgba(201,162,39,.32)" stroke-width="1"/>
  <!-- Shield overlay (top of vault) -->
  <path d="M350,87 L385,101 L385,142 Q385,168 350,180 Q315,168 315,142 L315,101 Z"
        fill="rgba(0,168,232,.09)" stroke="rgba(0,168,232,.32)" stroke-width="1.5"/>
  <path d="M336,130 L347,143 L366,122"
        stroke="rgba(46,204,113,.88)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connection lines to corner nodes -->
  <line x1="135" y1="118" x2="240" y2="162" stroke="rgba(0,168,232,.14)" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="135" y1="298" x2="240" y2="248" stroke="rgba(201,162,39,.12)" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="565" y1="118" x2="460" y2="162" stroke="rgba(0,168,232,.14)" stroke-width="1" stroke-dasharray="4 8"/>
  <line x1="565" y1="298" x2="460" y2="248" stroke="rgba(201,162,39,.12)" stroke-width="1" stroke-dasharray="4 8"/>
  <!-- Corner nodes -->
  <circle cx="118" cy="108" r="9" fill="rgba(0,168,232,.18)"  stroke="rgba(0,168,232,.42)"  stroke-width="1.5"/>
  <circle cx="118" cy="108" r="4" fill="rgba(0,168,232,.7)"/>
  <circle cx="118" cy="300" r="9" fill="rgba(201,162,39,.18)" stroke="rgba(201,162,39,.42)" stroke-width="1.5"/>
  <circle cx="118" cy="300" r="4" fill="rgba(201,162,39,.7)"/>
  <circle cx="582" cy="108" r="9" fill="rgba(0,168,232,.18)"  stroke="rgba(0,168,232,.42)"  stroke-width="1.5"/>
  <circle cx="582" cy="108" r="4" fill="rgba(0,168,232,.7)"/>
  <circle cx="582" cy="300" r="9" fill="rgba(201,162,39,.18)" stroke="rgba(201,162,39,.42)" stroke-width="1.5"/>
  <circle cx="582" cy="300" r="4" fill="rgba(201,162,39,.7)"/>
  <!-- Bottom badge row -->
  <rect x="148" y="363" width="106" height="24" rx="12" fill="rgba(46,204,113,.1)"  stroke="rgba(46,204,113,.3)"  stroke-width="1"/>
  <circle cx="162" cy="375" r="6" fill="rgba(46,204,113,.68)"/>
  <rect x="174" y="370" width="68" height="10" rx="5" fill="rgba(255,255,255,.12)"/>
  <rect x="297" y="363" width="106" height="24" rx="12" fill="rgba(0,168,232,.1)"   stroke="rgba(0,168,232,.3)"   stroke-width="1"/>
  <circle cx="311" cy="375" r="6" fill="rgba(0,168,232,.68)"/>
  <rect x="323" y="370" width="68" height="10" rx="5" fill="rgba(255,255,255,.12)"/>
  <rect x="446" y="363" width="106" height="24" rx="12" fill="rgba(201,162,39,.1)"  stroke="rgba(201,162,39,.3)"  stroke-width="1"/>
  <circle cx="460" cy="375" r="6" fill="rgba(201,162,39,.68)"/>
  <rect x="472" y="370" width="68" height="10" rx="5" fill="rgba(255,255,255,.12)"/>
  <!-- Floating particles -->
  <circle cx="84"  cy="200" r="3.5" fill="rgba(0,168,232,.22)"/>
  <circle cx="616" cy="200" r="3.5" fill="rgba(201,162,39,.22)"/>
  <circle cx="200" cy="60"  r="3"   fill="rgba(201,162,39,.18)"/>
  <circle cx="500" cy="60"  r="3"   fill="rgba(0,168,232,.18)"/>
  <circle cx="158" cy="350" r="2.5" fill="rgba(255,255,255,.14)"/>
  <circle cx="542" cy="350" r="2.5" fill="rgba(255,255,255,.14)"/>
</svg>
